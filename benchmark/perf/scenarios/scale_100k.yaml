# Scale Test - 100K Memories
#
# Search latency test with 100,000 pre-populated memories.
# WARNING: Setup phase may take 30-60 minutes depending on server performance.
#
# Usage:
#   export MNEMO_API_TOKEN="mnemo_..."
#   python3 benchmark/perf/load_test.py --scenario-file benchmark/perf/scenarios/scale_100k.yaml --results-dir benchmark/perf/results

name: "scale_100k"
description: "Search latency with 100,000 pre-populated memories"

setup:
  num_memories: 100000
  content_template: "Memory {id}: Large-scale user interaction dataset. Topic: {random}. Details: preferences, context, and conversation at {timestamp}."
  tags: ["scale-test", "100k"]
  batch_size: 1000

phases:
  - name: "baseline_search"
    description: "Baseline search performance at 100K scale"
    duration_seconds: 60
    concurrency: 20
    ramp_up_seconds: 5
    operations:
      - type: "search_memory"
        weight: 50
        params:
          query: "user preferences"
          k: 10

      - type: "search_hybrid"
        weight: 50
        params:
          query: "conversation history"
          k: 10

  - name: "high_concurrency"
    description: "High concurrency search at 100K scale"
    duration_seconds: 60
    concurrency: 100
    ramp_up_seconds: 10
    operations:
      - type: "search_memory"
        weight: 50
        params:
          query: "settings"
          k: 20

      - type: "search_hybrid"
        weight: 50
        params:
          query: "context"
          k: 20
